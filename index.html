    <script>
        (function () {
            var heroTitle = document.getElementById('hero-title');
            var heroTitleTop = document.getElementById('hero-title-top');
            var heroTitleBottom = document.getElementById('hero-title-bottom');

            if (!heroTitle || !heroTitleTop || !heroTitleBottom) {
                return;
            }

            function applyHeroTitleStyle() {
                var isMobile = window.innerWidth <= 767;

                heroTitleTop.style.display = 'block';
                heroTitleBottom.style.display = 'block';

                if (isMobile) {
                    heroTitle.style.color = '#f5f5f5';
                    heroTitle.style.background = 'none';
                    heroTitle.style.backgroundImage = 'none';
                    heroTitle.style.webkitBackgroundClip = 'border-box';
                    heroTitle.style.backgroundClip = 'border-box';
                    heroTitle.style.webkitTextFillColor = '#f5f5f5';
                    heroTitle.style.textShadow = '0 2px 10px rgba(0, 0, 0, 0.28)';
                    heroTitleTop.style.color = '#f5f5f5';
                    heroTitleTop.style.background = 'none';
                    heroTitleTop.style.backgroundImage = 'none';
                    heroTitleTop.style.webkitBackgroundClip = 'border-box';
                    heroTitleTop.style.backgroundClip = 'border-box';
                    heroTitleTop.style.webkitTextFillColor = '#f5f5f5';
                    heroTitleBottom.style.color = '#f5f5f5';
                    heroTitleBottom.style.background = 'none';
                    heroTitleBottom.style.backgroundImage = 'none';
                    heroTitleBottom.style.webkitBackgroundClip = 'border-box';
                    heroTitleBottom.style.backgroundClip = 'border-box';
                    heroTitleBottom.style.webkitTextFillColor = '#f5f5f5';
                } else {
                    heroTitle.style.color = '#ffffff';
                    heroTitle.style.background = 'none';
                    heroTitle.style.backgroundImage = 'none';
                    heroTitle.style.webkitBackgroundClip = 'border-box';
                    heroTitle.style.backgroundClip = 'border-box';
                    heroTitle.style.webkitTextFillColor = '#ffffff';
                    heroTitle.style.textShadow = 'none';
                    heroTitleTop.style.color = '#c4c4c4';
                    heroTitleTop.style.background = 'none';
                    heroTitleTop.style.backgroundImage = 'none';
                    heroTitleTop.style.webkitBackgroundClip = 'border-box';
                    heroTitleTop.style.backgroundClip = 'border-box';
                    heroTitleTop.style.webkitTextFillColor = '#c4c4c4';
                    heroTitleBottom.style.display = 'inline-block';
                    heroTitleBottom.style.color = '#e6e6e6';
                    heroTitleBottom.style.background = 'linear-gradient(to bottom, #e6e6e6 0%, #b7c6dc 40%, #1f3f73 100%)';
                    heroTitleBottom.style.backgroundImage = 'linear-gradient(to bottom, #e6e6e6 0%, #b7c6dc 40%, #1f3f73 100%)';
                    heroTitleBottom.style.webkitBackgroundClip = 'text';
                    heroTitleBottom.style.backgroundClip = 'text';
                    heroTitleBottom.style.webkitTextFillColor = 'transparent';
                }
            }

            applyHeroTitleStyle();
            window.addEventListener('resize', applyHeroTitleStyle);
        })();
    </script>
